  <!-- ─── Contact ─── -->
  <section id="contact" class="reveal">
    <div class="contact-inner">
      <div class="contact-left">
        <span class="section-label">GET IN TOUCH</span>
        <h2 class="contact-h2">Let's build<br>something real.</h2>
        <p class="contact-sub">I'm Asmit Rawat—based in Dehradun and graduating BCA in 2026. Whether you need a web app built at light speed or AI product shots for your store, let's talk!</p>
        <div class="contact-info-cards">
          <div class="contact-info-card">
            <div class="contact-info-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </div>
            <div>
              <span class="contact-info-label">Email</span>
              <a href="mailto:asmitrawat360@gmail.com" class="contact-info-value">asmitrawat360@gmail.com</a>
            </div>
          </div>
          <div class="contact-info-card">
            <div class="contact-info-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            </div>
            <div>
              <span class="contact-info-label">Location</span>
              <span class="contact-info-value">Dehradun, India • BCA '26</span>
            </div>
          </div>
          <div class="contact-info-card">
            <div class="contact-info-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            </div>
            <div>
              <span class="contact-info-label">GitHub</span>
              <a href="https://github.com/asmit260" target="_blank" rel="noopener" class="contact-info-value">github.com/asmit260</a>
            </div>
          </div>
        </div>
      </div>
      <div class="contact-right">
        <form id="contact-form" class="contact-form">
          <div class="form-group">
            <label for="contact-name">Name</label>
            <input type="text" id="contact-name" name="name" placeholder="Your name" required>
          </div>
          <div class="form-group">
            <label for="contact-email">Email</label>
            <input type="email" id="contact-email" name="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label for="contact-service">How can I help you?</label>
            <select id="contact-service" name="service">
              <option value="" disabled selected>What do you need?</option>
              <option value="vibecoding-web">Vibecoding &amp; Web App Development</option>
              <option value="ai-product-images">AI Product Photography &amp; Visuals</option>
              <option value="prompt-engineering">Prompt Engineering &amp; Automation</option>
              <option value="other">Something else / Just saying hi</option>
            </select>
          </div>
          <div class="form-group">
            <label for="contact-message">Message</label>
            <textarea id="contact-message" name="message" rows="4" placeholder="Tell me about your project or idea..." required></textarea>
          </div>
          <button type="submit" class="form-submit" id="contact-submit">
            <span>Send Message</span>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9z"/></svg>
          </button>
        </form>
      </div>
    </div>
  </section>
